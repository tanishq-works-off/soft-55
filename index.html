<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gemology Card System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #fdfcfb, #e2d1c3);
    padding: 20px;
}
.container {
    max-width: 950px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.15);
}
h2 {
    text-align: center;
}
input, button {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
}
button {
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover {
    background: #333;
}
.record {
    display: flex;
    justify-content: space-between;
    border: 2px solid #000;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    background: #fafafa;
}
.left {
    width: 65%;
}
.right {
    width: 30%;
    text-align: center;
}
.right img {
    width: 170px;
    border-radius: 8px;
}
.qr {
    margin-top: 10px;
}
.export-btn {
    background: green;
}
</style>
</head>

<body>

<div class="container">
    <h2>Gemology Certificate System</h2>

    <input type="text" id="colour" placeholder="Colour">
    <input type="text" id="mounted" placeholder="Mounted (Yes/No)">
    <input type="text" id="weight" placeholder="Weight (carat)">
    <input type="text" id="measurements" placeholder="Measurements">
    <input type="text" id="shape" placeholder="Shape">
    <input type="text" id="faces" placeholder="Natural Faces">
    <input type="text" id="test" placeholder="Test Performed">
    <input type="text" id="comments" placeholder="Comments">
    <input type="file" id="image">

    <button onclick="saveRecord()">Save Card</button>
    <button class="export-btn" onclick="exportExcel()">Export Excel</button>

    <h3>Gem Cards</h3>
    <div id="records"></div>
</div>

<script>

let records = JSON.parse(localStorage.getItem("records")) || [];
let serial = localStorage.getItem("serial") || 1;

function saveRecord() {

    let data = {
        serial: serial,
        colour: document.getElementById("colour").value,
        mounted: document.getElementById("mounted").value,
        weight: document.getElementById("weight").value,
        measurements: document.getElementById("measurements").value,
        shape: document.getElementById("shape").value,
        faces: document.getElementById("faces").value,
        test: document.getElementById("test").value,
        comments: document.getElementById("comments").value
    };

    let imageInput = document.getElementById("image");
    let reader = new FileReader();

    reader.onload = function () {

        data.image = reader.result || "";

        records.push(data);
        localStorage.setItem("records", JSON.stringify(records));

        serial++;
        localStorage.setItem("serial", serial);

        displayRecords();
    };

    if (imageInput.files[0]) {
        reader.readAsDataURL(imageInput.files[0]);
    } else {
        reader.onload();
    }
}

function displayRecords() {

    let container = document.getElementById("records");
    container.innerHTML = "";

    records.forEach((r, index) => {

        let div = document.createElement("div");
        div.className = "record";

        let qrData = JSON.stringify({
            SR: r.serial,
            Colour: r.colour,
            Mounted: r.mounted,
            Weight: r.weight,
            Measurements: r.measurements,
            Shape: r.shape,
            Faces: r.faces,
            Test: r.test,
            Comments: r.comments,
            Image: r.image || ""
        });

        div.innerHTML = `
            <div class="left">
                <strong>SR No:</strong> ${r.serial}<br>
                <strong>Colour:</strong> ${r.colour}<br>
                <strong>Mounted:</strong> ${r.mounted}<br>
                <strong>Weight:</strong> ${r.weight}<br>
                <strong>Measurements:</strong> ${r.measurements}<br>
                <strong>Shape:</strong> ${r.shape}<br>
                <strong>Natural Faces:</strong> ${r.faces}<br>
                <strong>Test:</strong> ${r.test}<br>
                <strong>Comments:</strong> ${r.comments}
            </div>

            <div class="right">
                ${r.image ? `<img src="${r.image}">` : ""}
                <div id="qr${index}" class="qr"></div>
            </div>
        `;

        container.appendChild(div);

        new QRCode(document.getElementById(`qr${index}`), {
            text: qrData,
            width: 120,
            height: 120
        });
    });
}

function exportExcel() {

    let csv = "SR,Colour,Mounted,Weight,Measurements,Shape,Faces,Test,Comments\n";

    records.forEach(r => {
        csv += `${r.serial},${r.colour},${r.mounted},${r.weight},${r.measurements},${r.shape},${r.faces},${r.test},${r.comments}\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "gemology_records.csv";
    a.click();
}

displayRecords();

</script>

</body>
</html>
