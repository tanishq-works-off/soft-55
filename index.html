<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Lab Record System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #e3f2fd, #ffffff);
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
h2 {
    text-align: center;
}
input, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}
button {
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover {
    background: #333;
}
.record {
    border: 1px solid #ddd;
    padding: 12px;
    margin-top: 12px;
    border-radius: 8px;
}
img {
    max-width: 100px;
    margin-top: 10px;
    border-radius: 6px;
}
.qr {
    margin-top: 10px;
}
.export-btn {
    background: green;
}
</style>
</head>

<body>

<div class="container">
    <h2>Advanced Lab Test Record System</h2>

    <input type="text" id="name" placeholder="Patient Name">
    <input type="text" id="test" placeholder="Test Type">
    <input type="text" id="result" placeholder="Result">
    <input type="file" id="image">

    <button onclick="saveRecord()">Save Record</button>
    <button class="export-btn" onclick="exportExcel()">Export to Excel</button>

    <h3>Records</h3>
    <div id="records"></div>
</div>

<script>

let records = JSON.parse(localStorage.getItem("records")) || [];
let serial = localStorage.getItem("serial") || 1;

function saveRecord() {
    let name = document.getElementById("name").value;
    let test = document.getElementById("test").value;
    let result = document.getElementById("result").value;
    let imageInput = document.getElementById("image");

    if (!name || !test || !result) {
        alert("Fill all fields!");
        return;
    }

    let reader = new FileReader();

    reader.onload = function () {
        let record = {
            serial: serial,
            name: name,
            test: test,
            result: result,
            image: reader.result
        };

        records.push(record);
        localStorage.setItem("records", JSON.stringify(records));

        serial++;
        localStorage.setItem("serial", serial);

        displayRecords();
    };

    if (imageInput.files[0]) {
        reader.readAsDataURL(imageInput.files[0]);
    } else {
        reader.onload();
    }
}

function displayRecords() {
    let container = document.getElementById("records");
    container.innerHTML = "";

    records.forEach((r, index) => {
        let div = document.createElement("div");
        div.className = "record";

        div.innerHTML = `
            <strong>Serial No:</strong> ${r.serial}<br>
            <strong>Name:</strong> ${r.name}<br>
            <strong>Test:</strong> ${r.test}<br>
            <strong>Result:</strong> ${r.result}
            ${r.image ? `<br><img src="${r.image}">` : ""}
            <div id="qr${index}" class="qr"></div>
        `;

        container.appendChild(div);

        new QRCode(document.getElementById(`qr${index}`), {
            text: `Serial:${r.serial}, Name:${r.name}, Test:${r.test}, Result:${r.result}`,
            width: 100,
            height: 100
        });
    });
}

function exportExcel() {
    let csv = "Serial,Name,Test,Result\n";

    records.forEach(r => {
        csv += `${r.serial},${r.name},${r.test},${r.result}\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "lab_records.csv";
    a.click();
}

displayRecords();

</script>

</body>
</html>
